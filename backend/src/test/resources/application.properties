spring.config.import=optional:file:../.env[.properties]

# Configuración para TESTS

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# Base de datos de test
spring.datasource.url=${DB_URL_TEST}
spring.datasource.username=${DB_USERNAME_TEST}
spring.datasource.password=${DB_PASSWORD_TEST}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate en tests: crea/borra esquema en cada ejecución
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Integraciones externas para tests
cloudinary.url=${CLOUDINARY_URL}
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# Webhook Stripe
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# JWT para tests
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-days=${JWT_EXP_DAYS}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend-url=${FRONTEND_URL}
