<div class="space-y-6">
  <div class="flex items-center gap-4">
    <a routerLink="/admin/users" class="text-blue-600 hover:text-blue-800 font-medium">← Volver</a>
    <h1 class="text-3xl font-bold text-gray-900">Nuevo Usuario</h1>
  </div>

  <div *ngIf="error()" class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700">
    {{ error() }}
  </div>

  <div class="bg-white border border-gray-200 rounded-lg p-6 max-w-2xl">
    <div class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre <span class="text-red-500">*</span></label>
          <input
            type="text"
            [(ngModel)]="form.nombre"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Apellido <span class="text-red-500">*</span></label>
          <input
            type="text"
            [(ngModel)]="form.apellido"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
        <input
          type="email"
          [(ngModel)]="form.email"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña <span class="text-red-500">*</span></label>
        <input
          type="password"
          [(ngModel)]="form.password"
          placeholder="Mínimo 8 caracteres"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
        <input
          type="tel"
          [(ngModel)]="form.telefono"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
        <textarea
          [(ngModel)]="form.direccion"
          rows="3"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        ></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button
          (click)="save()"
          [disabled]="isSaving()"
          class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isSaving() ? 'Creando...' : 'Crear Usuario' }}
        </button>
        <a
          routerLink="/admin/users"
          class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition text-center"
        >
          Cancelar
        </a>
      </div>

    </div>
  </div>
</div>
