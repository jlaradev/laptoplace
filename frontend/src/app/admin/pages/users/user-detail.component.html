<div class="space-y-6">
  <div class="flex items-center gap-4">
    <a routerLink="/admin/users" class="text-blue-600 hover:text-blue-800 font-medium">← Volver</a>
    <h1 class="text-3xl font-bold text-gray-900">Detalle de Usuario</h1>
  </div>

  <div *ngIf="isLoading()" class="text-center py-12">
    <p class="text-gray-600">Cargando usuario...</p>
  </div>

  <div *ngIf="error()" class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700">
    {{ error() }}
  </div>

  <div *ngIf="saveSuccess()" class="bg-green-50 border border-green-200 rounded-lg p-4 text-green-700">
    ✅ Usuario actualizado correctamente
  </div>

  <div *ngIf="!isLoading() && user()" class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- Info de solo lectura -->
    <div class="bg-white border border-gray-200 rounded-lg p-6">
      <h2 class="text-lg font-bold text-gray-900 mb-4">Información de la cuenta</h2>
      <div class="space-y-3">
        <div>
          <p class="text-xs text-gray-500 uppercase font-medium">ID</p>
          <p class="text-sm text-gray-700 font-mono">{{ user()?.id }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-500 uppercase font-medium">Email</p>
          <p class="text-sm text-gray-900">{{ user()?.email }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-500 uppercase font-medium">Fecha de registro</p>
          <p class="text-sm text-gray-700">{{ user()?.createdAt | date: 'dd/MM/yyyy HH:mm' }}</p>
        </div>
      </div>
    </div>

    <!-- Formulario de edición -->
    <div class="bg-white border border-gray-200 rounded-lg p-6">
      <h2 class="text-lg font-bold text-gray-900 mb-4">Editar datos</h2>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input
              type="text"
              [(ngModel)]="editForm.nombre"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
            <input
              type="text"
              [(ngModel)]="editForm.apellido"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
          <input
            type="tel"
            [(ngModel)]="editForm.telefono"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
          <textarea
            [(ngModel)]="editForm.direccion"
            rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>
        </div>
        <div class="pt-2">
          <button
            (click)="save()"
            [disabled]="isSaving()"
            class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            {{ isSaving() ? 'Guardando...' : 'Guardar cambios' }}
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
